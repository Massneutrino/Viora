services:
  postgres:
    image: postgres:16-alpine
    container_name: viora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: viora
      POSTGRES_PASSWORD: viora
      POSTGRES_DB: viora
    volumes:
      - viora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viora -d viora"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  viora_pg_data:
