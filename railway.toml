# Railway config for the API web service (monorepo root).
# Postgres is a separate Railway service — link DATABASE_URL in the dashboard.
# See docs/deploy.md.

[build]
buildCommand = "npm install && cd packages/database && npx prisma generate && cd ../.. && npx turbo run build --filter=@viora/api --force && test -f apps/api/dist/index.js"

[deploy]
startCommand = "cd packages/database && npx prisma migrate deploy && cd ../.. && npm run start --workspace @viora/api"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
